<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "manifold-3d": "https://cdn.jsdelivr.net/npm/manifold-3d@3.2.1/manifold.js"
  }
}
</script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="theme.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);font-family:var(--font-ui);-webkit-font-smoothing:antialiased}
    a{color:var(--accent)}a:hover{color:var(--accent)}
    @keyframes hgspin{to{transform:rotate(360deg)}}
    input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--edge);outline:none;margin:0}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;box-shadow:0 0 0 3px var(--accent-dim)}
    input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;background:var(--bg);color:var(--text);overflow:hidden">

  <!-- LEFT PANEL — PROPORTIONS -->
  <aside style="width:300px;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--edge)">
    <div style="padding:20px 20px 16px;border-bottom:1px solid var(--edge)">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)"></div>
        <span style="font:600 13px var(--font-mono);letter-spacing:.22em;text-transform:uppercase">Human&nbsp;Gen</span>
      </div>
      <div style="margin-top:8px;font:700 16px var(--font-ui)">Proportions</div>
      <div style="margin-top:3px;font:400 12px var(--font-ui);color:var(--muted);line-height:1.45">Body lives in <span style="font:400 10.5px var(--font-mono);color:var(--muted-2)">human-body.js</span></div>
    </div>

    <div style="flex:1;overflow-y:auto;padding:20px 20px 10px">
      <sc-for list="{{ sliders }}" as="item" hint-placeholder-count="9">
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px">
            <span style="font:500 12.5px var(--font-ui);color:var(--text-2)">{{ item.label }}</span>
            <span style="font:400 11px var(--font-mono);color:var(--accent)">{{ item.valueText }}</span>
          </div>
          <input type="range" min="{{ item.min }}" max="{{ item.max }}" step="{{ item.step }}" value="{{ item.value }}" onChange="{{ item.onChange }}" style="width:100%;display:block">
        </div>
      </sc-for>
    </div>

    <div style="padding:14px 20px 20px;border-top:1px solid var(--edge);display:grid;grid-template-columns:1fr 1fr;gap:9px">
      <button onClick="{{ randomize }}" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;border-radius:10px;border:none;cursor:pointer;background:var(--accent);color:var(--on-accent);font:700 13px var(--font-ui);transition:transform .1s" style-hover="transform:translateY(-1px)" style-active="transform:translateY(0)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--on-accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        Random
      </button>
      <button onClick="{{ reset }}" style="padding:11px 8px;border-radius:10px;cursor:pointer;background:var(--panel-2);color:var(--text-2);border:1px solid var(--edge);font:600 13px var(--font-ui);transition:background .12s" style-hover="background:var(--panel-3)">Reset</button>
    </div>
  </aside>

  <!-- VIEWPORT -->
  <div style="position:relative;flex:1;min-width:0;background:var(--viewport)">
    <div ref="{{ viewportRef }}" style="position:absolute;inset:0"></div>

    <!-- T-pose badge -->
    <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:7px;background:var(--accent-dim);border:1px solid var(--accent-dim);pointer-events:none">
      <span style="font:500 10.5px var(--font-mono);letter-spacing:.12em;color:var(--accent)">{{ badgeText }}</span>
    </div>

    <!-- orbit hint -->
    <div style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font:400 11px var(--font-mono);color:var(--muted);letter-spacing:.04em;pointer-events:none;white-space:nowrap">drag to orbit · scroll to zoom</div>

    <!-- loading / fusing -->
    <sc-if value="{{ busy }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:color-mix(in srgb, var(--bg) 55%, transparent)">
        <div style="width:34px;height:34px;border-radius:50%;border:3px solid var(--accent-dim);border-top-color:var(--accent);animation:hgspin .8s linear infinite"></div>
        <span style="font:500 12px var(--font-mono);letter-spacing:.1em;color:var(--text-2);text-transform:uppercase">{{ busyText }}</span>
      </div>
    </sc-if>
  </div>

  <!-- RIGHT PANEL — APPEARANCE + ACTIONS -->
  <aside style="width:280px;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--edge)">
    <div style="padding:20px 20px 16px;border-bottom:1px solid var(--edge)">
      <div style="font:700 16px var(--font-ui)">Appearance</div>
      <div style="margin-top:3px;font:400 12px var(--font-ui);color:var(--muted)">Material · mesh · display</div>
    </div>

    <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:22px">

      <!-- clay color -->
      <div>
        <div style="font:500 11px var(--font-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Clay color</div>
        <div style="display:flex;gap:9px">
          <sc-for list="{{ swatches }}" as="item" hint-placeholder-count="4">
            <button onClick="{{ item.pick }}" title="{{ item.hex }}" style="width:34px;height:34px;border-radius:9px;cursor:pointer;background:{{ item.hex }};border:2px solid {{ item.ring }};transition:transform .1s" style-hover="transform:scale(1.08)"></button>
          </sc-for>
        </div>
      </div>

      <!-- fuse -->
      <div>
        <div style="font:500 11px var(--font-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Mesh</div>
        <button onClick="{{ fuse }}" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:11px;cursor:pointer;background:{{ fuseBg }};color:{{ fuseColor }};border:1px solid {{ fuseBorder }};font:700 13px var(--font-ui);transition:transform .1s" style-hover="transform:translateY(-1px)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12a4 4 0 1 1 8 0 4 4 0 0 1-8 0"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
          {{ fuseLabel }}
        </button>
        <div style="margin-top:8px;font:400 11px var(--font-ui);color:var(--muted);line-height:1.5">{{ fuseHint }}</div>
        <div style="margin-top:14px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px">
            <span style="font:500 12px var(--font-ui);color:var(--text-2)">Fillet size</span>
            <span style="font:400 11px var(--font-mono);color:var(--accent)">{{ smoothPowerText }}</span>
          </div>
          <input type="range" min="0.05" max="1" step="0.01" value="{{ smoothPower }}" onChange="{{ setSmoothPower }}" style="width:100%;display:block">
        </div>
      </div>

      <!-- display toggles -->
      <div style="display:flex;flex-direction:column;gap:9px">
        <div style="font:500 11px var(--font-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:1px">Display</div>
        <button onClick="{{ toggleWire }}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 13px;border-radius:10px;cursor:pointer;background:{{ wireBg }};border:1px solid {{ wireBorder }};color:{{ wireColor }};font:500 12.5px var(--font-ui);transition:background .12s">
          <span>Wireframe overlay</span>
          <span style="width:8px;height:8px;border-radius:50%;background:{{ wireColor }}"></span>
        </button>
        <button onClick="{{ toggleRotate }}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 13px;border-radius:10px;cursor:pointer;background:{{ rotateBg }};border:1px solid {{ rotateBorder }};color:{{ rotateColor }};font:500 12.5px var(--font-ui);transition:background .12s">
          <span>Auto-rotate</span>
          <span style="width:8px;height:8px;border-radius:50%;background:{{ rotateColor }}"></span>
        </button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div style="padding:16px 20px 20px;border-top:1px solid var(--edge);display:flex;flex-direction:column;gap:10px">
      <div style="font:400 11px var(--font-mono);color:var(--muted);text-align:center">{{ statsText }}</div>
      <button onClick="{{ exportGLB }}" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:11px;cursor:pointer;background:var(--panel-2);color:var(--text-2);border:1px solid var(--edge);font:600 13px var(--font-ui);transition:background .12s" style-hover="background:var(--panel-3)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        {{ exportLabel }}
      </button>
      <sc-if value="{{ embedded }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ sendToStudio }}" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:11px;cursor:pointer;background:var(--accent);color:var(--on-accent);border:none;font:700 13px var(--font-ui);transition:transform .1s" style-hover="transform:translateY(-1px)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
          {{ sendLabel }}
        </button>
      </sc-if>
    </div>
  </aside>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    params: null, rotate: true, loading: true, wire: false, fused: false, fusing: false,
    exporting: false, sending: false, embedded: false, stats: '\u2014', clay: '#bfc5cf',
    smoothPower: 0.4,
  };



  ACCENT = 'var(--accent)';
  SWATCHES = ['#bfc5cf', '#c8ad92', '#77808d', '#a5b8ae'];
  viewportRef = (el) => { this.viewportEl = el; };

  // ---------- lifecycle ----------
  async componentDidMount() {
    const [T, oc, HB] = await Promise.all([
      import('three'),
      import('three/addons/controls/OrbitControls.js'),
      import('./studio3D_scripts/human-body.js'),
    ]);
    this.T = T; this.OrbitControls = oc.OrbitControls; this.HB = HB;
    if (!this.viewportEl) return;
    const params = HB.defaults();
    this.initScene();
    this.buildFigure(params);
    this.animate();
    this.ro = new ResizeObserver(() => this.resize());
    this.ro.observe(this.viewportEl);
    this.setState({ loading: false, params, stats: this.stats });
    this.setupBridge();
  }

  componentWillUnmount() {
    cancelAnimationFrame(this.raf);
    if (this.ro) this.ro.disconnect();
    if (this.renderer) { this.renderer.dispose(); this.renderer.domElement.remove(); }
  }

  // ---------- studio bridge ----------
  setupBridge() {
    const params = new URLSearchParams(location.search);
    const embedded = params.get('embed') === '1' || window.parent !== window;
    this._post = (type, payload, transfer) => { try { window.parent && window.parent.postMessage(Object.assign({ __studio: true, type }, payload || {}), '*', transfer || []); } catch (e) {} };
    this.setState({ embedded });
    setTimeout(() => this._post('studio:ready', { tool: 'humangen' }), 0);
  }

  buildGLB() {
    return new Promise(async (res, rej) => {
      try {
        const { GLTFExporter } = await import('three/addons/exporters/GLTFExporter.js');
        const grp = new this.T.Group(); grp.name = 'Human';
        const m = this.mesh.clone(); m.name = 'Body'; grp.add(m);
        new GLTFExporter().parse(grp, (buf) => res(buf instanceof ArrayBuffer ? buf : new Uint8Array(buf).buffer), (err) => rej(err), { binary: true });
      } catch (e) { rej(e); }
    });
  }

  sendToStudio = async () => {
    if (this.state.sending || !this.mesh) return;
    this.setState({ sending: true });
    try {
      const buf = await this.buildGLB();
      this._post('studio:saveChar', { buffer: buf, name: 'human_tpose.glb', goto: 'showcase' }, [buf]);
      this.setState({ sending: false });
    } catch (e) { console.error(e); this.setState({ sending: false }); }
  };

  // ---------- scene ----------
  initScene() {
    const T = this.T, el = this.viewportEl;
    const w = el.clientWidth || 800, h = el.clientHeight || 600;
    const r = new T.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    r.setPixelRatio(Math.min(devicePixelRatio, 2));
    r.setSize(w, h);
    r.shadowMap.enabled = true; r.shadowMap.type = T.PCFSoftShadowMap;
    r.toneMapping = T.ACESFilmicToneMapping; r.toneMappingExposure = 1.05;
    r.outputColorSpace = T.SRGBColorSpace;
    el.appendChild(r.domElement);
    this.renderer = r;

    const scene = new T.Scene(); this.scene = scene;
    const cam = new T.PerspectiveCamera(34, w / h, 0.1, 100);
    cam.position.set(0.4, 1.05, 4.0); this.cam = cam;

    const ctr = new this.OrbitControls(cam, r.domElement);
    ctr.target.set(0, 0.95, 0);
    ctr.enableDamping = true; ctr.dampingFactor = 0.08;
    ctr.minDistance = 1.6; ctr.maxDistance = 7;
    ctr.minPolarAngle = 0.35; ctr.maxPolarAngle = 1.62;
    ctr.enablePan = false;
    ctr.autoRotate = this.state.rotate; ctr.autoRotateSpeed = 1.1;
    this.controls = ctr;

    scene.add(new T.HemisphereLight(0xffffff, 0x3a3f4d, 0.95));
    const key = new T.DirectionalLight(0xffffff, 1.7);
    key.position.set(3, 6, 4); key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.near = 1; key.shadow.camera.far = 14;
    const sc = 2.2; const sh = key.shadow.camera;
    sh.left = -sc; sh.right = sc; sh.top = sc * 1.6; sh.bottom = -0.3; sh.updateProjectionMatrix();
    key.shadow.bias = -0.0007; scene.add(key);
    const fill = new T.DirectionalLight(0xbcd2ff, 0.5); fill.position.set(-4, 2, -1); scene.add(fill);
    const rim = new T.DirectionalLight(0xffffff, 0.7); rim.position.set(-1, 3, -4); scene.add(rim);

    const ground = new T.Mesh(new T.CircleGeometry(3.2, 48), new T.ShadowMaterial({ opacity: 0.28 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
  }

  themeAccent() { try { return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#e6934f'; } catch (e) { return '#e6934f'; } }

  buildFigure(params) {
    const T = this.T;
    this.mat = new T.MeshStandardMaterial({ color: this.state.clay, roughness: 0.55, metalness: 0.05 });
    this.wireMat = new T.MeshBasicMaterial({ color: this.themeAccent(), wireframe: true, transparent: true, opacity: 0.16, depthTest: true });
    const geo = this.HB.buildHumanGeometry(T, params);
    this.mesh = new T.Mesh(geo, this.mat);
    this.mesh.name = 'Body';
    this.mesh.castShadow = this.mesh.receiveShadow = true;
    this.wireMesh = new T.Mesh(geo, this.wireMat);
    this.wireMesh.visible = this.state.wire;
    this.wireMesh.scale.setScalar(1.002);
    this.figure = new T.Group(); this.figure.name = 'Human';
    this.figure.add(this.mesh, this.wireMesh);
    this.scene.add(this.figure);
    this.updateStats(geo);
  }

  swapGeometry(geo) {
    this.mesh.geometry.dispose();
    this.mesh.geometry = geo;
    this.wireMesh.geometry = geo;
    this.updateStats(geo);
  }

  applyGeometry(params) {
    if (!this.mesh) return;
    this.swapGeometry(this.HB.buildHumanGeometry(this.T, params));
    if (this.controls) this.controls.target.y = 0.545 * params.height;
  }

  updateStats(geo) {
    const fmt = (n) => n.toLocaleString('en-US');
    this.stats = fmt(geo.attributes.position.count) + ' verts \u00b7 ' + fmt(geo.getIndex().count / 3) + ' tris';
  }

  resize() {
    const el = this.viewportEl; if (!el || !this.renderer) return;
    const w = el.clientWidth, h = el.clientHeight; if (!w || !h) return;
    this.renderer.setSize(w, h); this.cam.aspect = w / h; this.cam.updateProjectionMatrix();
  }
  animate = () => { this.raf = requestAnimationFrame(this.animate); if (this.controls) this.controls.update(); this.renderer.render(this.scene, this.cam); };

  // ---------- actions ----------
  setParam(key, val) {
    const params = Object.assign({}, this.state.params, { [key]: val });
    this.applyGeometry(params);
    this.setState({ params, fused: false, stats: this.stats });
  }
  randomize = () => {
    const params = this.HB.randomParams();
    this.applyGeometry(params);
    this.setState({ params, fused: false, stats: this.stats });
  };
  reset = () => {
    const params = this.HB.defaults();
    this.applyGeometry(params);
    this.setState({ params, fused: false, stats: this.stats });
  };

  // set three.js state directly in the handlers — never via componentDidUpdate,
  // which is unreliable across hot-reloads
  toggleRotate = () => {
    const rotate = !this.state.rotate;
    if (this.controls) this.controls.autoRotate = rotate;
    this.setState({ rotate });
  };
  toggleWire = () => {
    const wire = !this.state.wire;
    if (this.wireMesh) this.wireMesh.visible = wire;
    this.setState({ wire });
  };
  pickClay = (hex) => {
    if (this.mat) this.mat.color.set(hex);
    this.setState({ clay: hex });
  };

  fuse = async () => {
    if (this.state.fusing || !this.mesh) return;
    if (this.state.fused) { // back to raw lofted mesh
      this.applyGeometry(this.state.params);
      this.setState({ fused: false, stats: this.stats });
      return;
    }
    this.setState({ fusing: true });
    await new Promise(r => setTimeout(r, 30)); // let the overlay paint
    try {
      const { MarchingCubes } = await import('three/addons/objects/MarchingCubes.js');
      this._MC = MarchingCubes;
      const geo = this.HB.buildSmoothGeometry(this.T, MarchingCubes, this.state.params, { power: this.state.smoothPower, resolution: 144 });
      this.swapGeometry(geo);
      this.setState({ fusing: false, fused: true, stats: this.stats });
    } catch (e) { console.error(e); this.setState({ fusing: false }); }
  };

  setSmoothPower = (e) => {
    const smoothPower = parseFloat(e.target.value);
    this.setState({ smoothPower });
    // live re-weld while the model is in smoothed mode
    if (this.state.fused && !this.state.fusing && this._MC) {
      clearTimeout(this._smoothT);
      this._smoothT = setTimeout(() => {
        const geo = this.HB.buildSmoothGeometry(this.T, this._MC, this.state.params, { power: smoothPower, resolution: 144 });
        this.swapGeometry(geo);
        this.setState({ stats: this.stats });
      }, 120);
    }
  };

  exportGLB = async () => {
    if (this.state.exporting || !this.mesh) return;
    this.setState({ exporting: true });
    try {
      const buf = await this.buildGLB();
      const blob = new Blob([buf], { type: 'model/gltf-binary' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'human_tpose.glb';
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);
      this.setState({ exporting: false });
    } catch (e) { console.error(e); this.setState({ exporting: false }); }
  };

  fmtVal(def, v) {
    if (def.fmt === 'm') return v.toFixed(2) + ' m';
    if (def.fmt === 'pct') return Math.round(v * 100) + '';
    return v.toFixed(2) + '\u00d7';
  }

  // ---------- render ----------
  renderVals() {
    const A = this.ACCENT, st = this.state;
    const sliders = (this.HB && st.params) ? this.HB.HUMAN_PARAMS.map(def => ({
      label: def.label, min: def.min, max: def.max, step: def.step,
      value: st.params[def.key],
      valueText: this.fmtVal(def, st.params[def.key]),
      onChange: (e) => this.setParam(def.key, parseFloat(e.target.value)),
    })) : [];
    const swatches = this.SWATCHES.map(hex => ({
      hex, pick: () => this.pickClay(hex),
      ring: st.clay === hex ? A : 'var(--edge)',
    }));
    return {
      viewportRef: this.viewportRef,
      busy: st.loading || st.fusing,
      busyText: st.fusing ? 'smoothing mesh' : 'building scene',
      badgeText: st.fused ? 'T-POSE \u00b7 SMOOTHED \u00b7 RIG READY' : 'T-POSE \u00b7 RIG READY',
      sliders, swatches,
      statsText: st.stats,
      randomize: this.randomize,
      reset: this.reset,
      fuse: this.fuse,
      fuseLabel: st.fusing ? 'Welding\u2026' : (st.fused ? 'Back to raw' : 'Weld joints'),
      fuseHint: st.fused ? 'Seams filled with a fillet. Moving a proportion slider rebuilds the raw mesh.' : 'Fuses parts into one shape, filling the crease at each joint with a clay-like fillet.',
      smoothPower: st.smoothPower,
      smoothPowerText: Math.round(st.smoothPower * 100) + '',
      setSmoothPower: this.setSmoothPower,
      fuseBg: st.fused ? 'var(--accent-dim)' : 'var(--accent)',
      fuseColor: st.fused ? A : 'var(--on-accent)',
      fuseBorder: st.fused ? 'var(--accent-dim)' : 'transparent',
      exportGLB: this.exportGLB,
      exportLabel: st.exporting ? 'Exporting\u2026' : 'Export GLB',
      embedded: st.embedded,
      sendToStudio: this.sendToStudio,
      sendLabel: st.sending ? 'Sending\u2026' : 'Use in Studio',
      toggleRotate: this.toggleRotate,
      rotateColor: st.rotate ? A : 'var(--muted)',
      rotateBg: st.rotate ? 'var(--accent-dim)' : 'var(--panel-2)',
      rotateBorder: st.rotate ? 'var(--accent-dim)' : 'var(--edge)',
      toggleWire: this.toggleWire,
      wireColor: st.wire ? A : 'var(--muted)',
      wireBg: st.wire ? 'var(--accent-dim)' : 'var(--panel-2)',
      wireBorder: st.wire ? 'var(--accent-dim)' : 'var(--edge)',
    };
  }
}
</script>
