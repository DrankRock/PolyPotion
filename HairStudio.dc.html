<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "manifold-3d": "https://cdn.jsdelivr.net/npm/manifold-3d@3.2.1/manifold.js"
  }
}
</script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="theme.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);font-family:var(--font-ui);-webkit-font-smoothing:antialiased}
    @keyframes hgpulse{0%,100%{opacity:1}50%{opacity:.2}}
    .hgscroll::-webkit-scrollbar{width:10px}
    .hgscroll::-webkit-scrollbar-thumb{background:var(--edge);border:3px solid var(--panel)}
    .hgscroll::-webkit-scrollbar-track{background:transparent}
    input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:0;background:var(--edge);outline:none;accent-color:var(--accent)}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:18px;border-radius:1px;background:var(--accent);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.35)}
    input[type=range]::-moz-range-thumb{width:12px;height:18px;border:none;border-radius:1px;background:var(--accent);cursor:pointer}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;background:var(--bg);color:var(--text);overflow:hidden;font-family:var(--font-ui)">

  <!-- VIEWPORT -->
  <div style="position:relative;flex:1;min-width:0;background:var(--viewport)">
    <div ref="{{ viewportRef }}" style="position:absolute;inset:0"></div>

    <div style="position:absolute;top:18px;left:18px;width:13px;height:13px;border-left:1px solid var(--edge);border-top:1px solid var(--edge);pointer-events:none"></div>
    <div style="position:absolute;top:18px;right:18px;width:13px;height:13px;border-right:1px solid var(--edge);border-top:1px solid var(--edge);pointer-events:none"></div>
    <div style="position:absolute;bottom:18px;left:18px;width:13px;height:13px;border-left:1px solid var(--edge);border-bottom:1px solid var(--edge);pointer-events:none"></div>
    <div style="position:absolute;bottom:18px;right:18px;width:13px;height:13px;border-right:1px solid var(--edge);border-bottom:1px solid var(--edge);pointer-events:none"></div>

    <div style="position:absolute;top:30px;left:34px;font:500 10px var(--font-mono);letter-spacing:.18em;color:var(--edge);pointer-events:none">PERSP · 32MM · ORBIT</div>
    <div style="position:absolute;bottom:30px;left:34px;font:400 10px var(--font-mono);letter-spacing:.14em;color:var(--edge);pointer-events:none">DRAG ORBIT — SCROLL ZOOM</div>

    <div style="position:absolute;bottom:26px;right:30px;display:flex;gap:8px">
      <div style="display:flex;align-items:center;gap:8px;height:30px;padding:0 12px;background:var(--panel-2);border:1px solid var(--edge);font:500 10.5px var(--font-mono);letter-spacing:.1em;color:var(--text)">
        <span style="color:var(--muted)">CARDS</span><span>{{ cardCount }}</span>
      </div>
      <button onClick="{{ toggleRotate }}" style="display:flex;align-items:center;gap:8px;height:30px;padding:0 12px;cursor:pointer;background:{{ rotateBg }};border:1px solid {{ rotateBorder }};font:500 10.5px var(--font-mono);letter-spacing:.1em;color:{{ rotateColor }}">
        <span style="width:7px;height:7px;background:{{ rotateColor }}"></span>{{ rotateLabel }}
      </button>
    </div>

    <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:color-mix(in srgb, var(--viewport) 55%, transparent)">
        <div style="width:13px;height:13px;background:var(--accent);animation:hgpulse .9s ease-in-out infinite"></div>
        <span style="font:500 11px var(--font-mono);letter-spacing:.22em;color:var(--text)">BUILDING</span>
      </div>
    </sc-if>
  </div>

  <!-- PANEL -->
  <aside style="width:360px;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--edge)">

    <div style="display:flex;align-items:center;gap:13px;padding:20px 22px;border-bottom:1px solid var(--edge)">
      <div style="width:36px;height:36px;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--on-accent)" stroke-width="1.6" stroke-linecap="round"><path d="M7 21c-1-6 0-12 5-18"/><path d="M12 21c-.5-6 .5-12 4-18"/><path d="M17 21c0-6 .5-11 2-17"/></svg>
      </div>
      <div style="flex:1">
        <div style="font:700 16px var(--font-ui);letter-spacing:-.01em;line-height:1">Hair Studio</div>
        <div style="margin-top:5px;font:500 9.5px var(--font-mono);letter-spacing:.2em;color:var(--muted)">HAIR-CARD SYSTEM</div>
      </div>
      <div style="font:500 10px var(--font-mono);letter-spacing:.1em;color:var(--muted);border:1px solid var(--edge);padding:3px 7px">v1.0</div>
    </div>

    <div class="hgscroll" style="flex:1;overflow-y:auto;overflow-x:hidden">

      <!-- 01 STYLE -->
      <div style="padding:22px 22px 24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <span style="font:500 10px var(--font-mono);color:var(--accent);letter-spacing:.1em">01</span>
          <span style="font:600 11px var(--font-mono);letter-spacing:.2em;color:var(--text)">STYLE</span>
          <span style="flex:1;height:1px;background:var(--edge)"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          <sc-for list="{{ styleButtons }}" as="item" hint-placeholder-count="4">
            <button onClick="{{ item.onClick }}" style="display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:13px;cursor:pointer;text-align:left;background:{{ item.bg }};border:1px solid {{ item.border }};transition:all .1s">
              <span style="font:600 13px var(--font-ui);color:{{ item.color }}">{{ item.name }}</span>
              <span style="font:500 9px var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:{{ item.tagColor }}">{{ item.tag }}</span>
            </button>
          </sc-for>
        </div>
      </div>

      <!-- 02 COLOR -->
      <div style="padding:0 22px 24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <span style="font:500 10px var(--font-mono);color:var(--accent);letter-spacing:.1em">02</span>
          <span style="font:600 11px var(--font-mono);letter-spacing:.2em;color:var(--text)">COLOR</span>
          <span style="flex:1;height:1px;background:var(--edge)"></span>
          <span style="font:500 9.5px var(--font-mono);letter-spacing:.12em;color:var(--muted)">{{ colorName }}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:11px">
          <sc-for list="{{ colorSwatches }}" as="item" hint-placeholder-count="7">
            <button onClick="{{ item.onClick }}" title="{{ item.label }}" style="width:30px;height:30px;border-radius:2px;border:none;cursor:pointer;padding:0;background:{{ item.color }};box-shadow:{{ item.shadow }};transition:transform .1s" style-hover="transform:translateY(-2px)"></button>
          </sc-for>
        </div>
      </div>

      <!-- 03 SHAPE -->
      <div style="padding:0 22px 24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <span style="font:500 10px var(--font-mono);color:var(--accent);letter-spacing:.1em">03</span>
          <span style="font:600 11px var(--font-mono);letter-spacing:.2em;color:var(--text)">SHAPE</span>
          <span style="flex:1;height:1px;background:var(--edge)"></span>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
          <span style="font:500 11px var(--font-mono);letter-spacing:.12em;color:var(--muted-2)">DENSITY</span>
          <span style="font:500 11px var(--font-mono);color:var(--text);border:1px solid var(--edge);padding:2px 8px;min-width:50px;text-align:center">{{ densityPct }}</span>
        </div>
        <input type="range" min="0.45" max="1.45" step="0.05" value="{{ density }}" onInput="{{ onDensity }}" style="width:100%;margin-bottom:20px">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
          <span style="font:500 11px var(--font-mono);letter-spacing:.12em;color:var(--muted-2)">LENGTH</span>
          <span style="font:500 11px var(--font-mono);color:var(--text);border:1px solid var(--edge);padding:2px 8px;min-width:50px;text-align:center">{{ lengthPct }}</span>
        </div>
        <input type="range" min="0.6" max="1.5" step="0.05" value="{{ length }}" onInput="{{ onLength }}" style="width:100%">
      </div>

      <!-- 04 DETAIL -->
      <div style="padding:0 22px 24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <span style="font:500 10px var(--font-mono);color:var(--accent);letter-spacing:.1em">04</span>
          <span style="font:600 11px var(--font-mono);letter-spacing:.2em;color:var(--text)">DETAIL</span>
          <span style="flex:1;height:1px;background:var(--edge)"></span>
        </div>
        <button onClick="{{ toggleFly }}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;cursor:pointer;background:var(--panel-2);border:1px solid var(--edge)">
          <div style="text-align:left">
            <div style="font:600 12.5px var(--font-ui);color:var(--text)">Flyaways</div>
            <div style="margin-top:2px;font:500 9px var(--font-mono);letter-spacing:.08em;color:var(--muted)">STRAY STRANDS</div>
          </div>
          <span style="position:relative;width:40px;height:22px;border-radius:2px;background:{{ flyTrack }};transition:background .15s">
            <span style="position:absolute;top:2px;left:{{ flyKnob }};width:18px;height:18px;border-radius:1px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3);transition:left .15s"></span>
          </span>
        </button>
      </div>
    </div>

    <div style="padding:16px 22px 20px;border-top:1px solid var(--edge)">
      <div style="display:flex;justify-content:space-between;margin-bottom:11px;font:500 9px var(--font-mono);letter-spacing:.14em;color:var(--muted)">
        <span>OUTPUT</span><span>GLB · glTF 2.0</span>
      </div>
      <button onClick="{{ exportGLB }}" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;cursor:pointer;background:var(--accent);color:var(--on-accent);border:none;font:600 11px var(--font-mono);letter-spacing:.18em;transition:background .12s" style-hover="background:var(--accent)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        {{ exportLabel }}
      </button>
      <sc-if value="{{ embedded }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ sendToStudio }}" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;margin-top:8px;cursor:pointer;background:var(--accent);color:var(--on-accent);border:none;font:700 12px var(--font-ui);letter-spacing:.08em">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
          {{ sendLabel }}
        </button>
      </sc-if>
    </div>
  </aside>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { style: 1, color: 1, density: 1.0, length: 1.0, fly: true, rotate: true, loading: true, exporting: false, cards: 0, sending: false, embedded: false };

  STYLES = [
    { name: 'Short Crop', tag: 'buzz / fade' },
    { name: 'Side Part', tag: "classic men's" },
    { name: 'Long Straight', tag: 'shoulder length' },
    { name: 'Ponytail', tag: 'gathered back' },
  ];
  COLORS = [
    { c: '#15110e', n: 'Black' }, { c: '#3a2618', n: 'Dark brown' },
    { c: '#6b4327', n: 'Brown' }, { c: '#854a2a', n: 'Auburn' },
    { c: '#caa05a', n: 'Dark blonde' }, { c: '#e2c489', n: 'Blonde' },
    { c: '#bcbfc6', n: 'Gray' },
  ];
  EGG = { x: 1.0, y: 1.14, z: 1.05 };

  viewportRef = (el) => { this.viewportEl = el; };

  async componentDidMount() {
    const T = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
    const { RoomEnvironment } = await import('three/addons/environments/RoomEnvironment.js');
    this.T = T; this.OrbitControls = OrbitControls; this.RoomEnvironment = RoomEnvironment;
    if (!this.viewportEl) return;
    this.initScene();
    this.buildHead();
    this.hairTex = this.makeHairTexture();
    this.flowTex = this.makeFlowTexture();
    this.hairMat = new T.MeshStandardMaterial({ map: this.hairTex, transparent: true, alphaTest: 0.3, depthWrite: true, side: T.DoubleSide, roughness: 0.5, metalness: 0.0, envMapIntensity: 0.4, color: this.COLORS[this.state.color].c });
    this.capMat = new T.MeshStandardMaterial({ color: this.COLORS[this.state.color].c, map: this.flowTex, bumpMap: this.flowTex, bumpScale: 0.004, roughness: 0.88, metalness: 0.0, envMapIntensity: 0.3, side: T.DoubleSide });
    this.rebuildHair();
    this.animate();
    this.ro = new ResizeObserver(() => this.resize()); this.ro.observe(this.viewportEl);
    this.setState({ loading: false });
    this.setupBridge();
  }

  setupBridge() {
    const params = new URLSearchParams(location.search);
    const embedded = params.get('embed') === '1' || window.parent !== window;
    this._post = (type, payload, transfer) => { try { window.parent && window.parent.postMessage(Object.assign({ __studio: true, type }, payload || {}), '*', transfer || []); } catch (e) {} };
    this.setState({ embedded });
    setTimeout(() => this._post('studio:ready', { tool: 'hairstudio' }), 0);
  }

  sendToStudio = async () => {
    if (this.state.sending || !this.hair) return;
    this.setState({ sending: true });
    try {
      const { GLTFExporter } = await import('three/addons/exporters/GLTFExporter.js');
      const grp = new this.T.Group(); grp.add(this.hair.clone());
      new GLTFExporter().parse(grp, (buf) => {
        const ab = buf instanceof ArrayBuffer ? buf : new Uint8Array(buf).buffer;
        const name = 'hair_' + this.STYLES[this.state.style].name.toLowerCase().replace(/ /g, '') + '.glb';
        this._post('studio:saveChar', { buffer: ab, name, goto: 'showcase' }, [ab]);
        this.setState({ sending: false });
      }, (err) => { console.error(err); this.setState({ sending: false }); }, { binary: true });
    } catch (e) { console.error(e); this.setState({ sending: false }); }
  };
  componentWillUnmount() {
    cancelAnimationFrame(this.raf);
    if (this.ro) this.ro.disconnect();
    if (this.renderer) { this.renderer.dispose(); this.renderer.domElement.remove(); }
  }
  componentDidUpdate(_p, prev) {
    if (!this.T || this.state.loading) return;
    const s = this.state;
    if (prev.color !== s.color) { this.hairMat.color.set(this.COLORS[s.color].c); this.capMat.color.set(this.COLORS[s.color].c); }
    if (prev.style !== s.style || prev.density !== s.density || prev.length !== s.length || prev.fly !== s.fly) this.rebuildHair();
    if (prev.rotate !== s.rotate && this.controls) this.controls.autoRotate = s.rotate;
  }

  // ---------------- scene ----------------
  initScene() {
    const T = this.T, el = this.viewportEl;
    const w = el.clientWidth || 800, h = el.clientHeight || 600;
    const r = new T.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    r.setPixelRatio(Math.min(devicePixelRatio, 2)); r.setSize(w, h);
    r.toneMapping = T.ACESFilmicToneMapping; r.toneMappingExposure = 1.0; r.outputColorSpace = T.SRGBColorSpace;
    r.shadowMap.enabled = true; r.shadowMap.type = T.PCFSoftShadowMap;
    el.appendChild(r.domElement); this.renderer = r;

    const scene = new T.Scene(); this.scene = scene;
    const pmrem = new T.PMREMGenerator(r);
    scene.environment = pmrem.fromScene(new this.RoomEnvironment(), 0.04).texture;

    const cam = new T.PerspectiveCamera(32, w / h, 0.1, 100);
    cam.position.set(1.7, 0.55, 6.2); this.cam = cam;
    const ctr = new this.OrbitControls(cam, r.domElement);
    ctr.target.set(0, 0.0, 0); ctr.enableDamping = true; ctr.dampingFactor = 0.08;
    ctr.minDistance = 3.6; ctr.maxDistance = 10; ctr.enablePan = false;
    ctr.minPolarAngle = 0.4; ctr.maxPolarAngle = 1.85;
    ctr.autoRotate = this.state.rotate; ctr.autoRotateSpeed = 1.0; this.controls = ctr;

    scene.add(new T.HemisphereLight(0xffffff, 0x9a958c, 1.0));
    const key = new T.DirectionalLight(0xffffff, 1.7); key.position.set(2.5, 4, 3); key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024); key.shadow.bias = -0.0006;
    key.shadow.camera.near = 0.5; key.shadow.camera.far = 12;
    const c = key.shadow.camera; c.left = -2; c.right = 2; c.top = 2; c.bottom = -2; c.updateProjectionMatrix();
    scene.add(key);
    const fill = new T.DirectionalLight(0xeaf0ff, 1.0); fill.position.set(-3, 1.5, 2); scene.add(fill);
    const rim = new T.DirectionalLight(0xfff4e6, 0.9); rim.position.set(-2, 2.5, -3); scene.add(rim);
    scene.add(new T.AmbientLight(0xffffff, 0.25));

    const ground = new T.Mesh(new T.CircleGeometry(4, 48), new T.ShadowMaterial({ opacity: 0.22 }));
    ground.rotation.x = -Math.PI / 2; ground.position.y = -1.55; ground.receiveShadow = true; scene.add(ground);
  }
  resize() { const el = this.viewportEl; if (!el || !this.renderer) return; const w = el.clientWidth, h = el.clientHeight; if (!w || !h) return; this.renderer.setSize(w, h); this.cam.aspect = w / h; this.cam.updateProjectionMatrix(); }
  animate = () => { this.raf = requestAnimationFrame(this.animate); if (this.controls) this.controls.update(); this.renderer.render(this.scene, this.cam); };

  // ---------------- head placeholder ----------------
  buildHead() {
    const T = this.T, E = this.EGG;
    const skin = new T.MeshStandardMaterial({ color: 0xb8b1a6, roughness: 0.9, metalness: 0.0 });
    const g = new T.SphereGeometry(1, 64, 48); g.scale(E.x, E.y, E.z);
    const head = new T.Mesh(g, skin); head.castShadow = true; head.receiveShadow = true;
    this.scene.add(head); this.head = head;
    const neck = new T.Mesh(new T.CylinderGeometry(0.42, 0.5, 0.7, 24), skin);
    neck.position.y = -1.25; neck.castShadow = true; this.scene.add(neck);
  }

  // ---------------- strand texture ----------------
  makeHairTexture() {
    const T = this.T, W = 128, H = 512;
    const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
    const x = cv.getContext('2d');
    x.clearRect(0, 0, W, H);
    x.fillStyle = 'rgba(70,66,60,0.92)'; x.fillRect(W * 0.1, 0, W * 0.8, H * 0.93);
    for (let i = 0; i < 150; i++) {
      const sx = Math.random() * W;
      const len = H * (0.7 + Math.random() * 0.3);
      const wob = (Math.random() - 0.5) * 14;
      const l = 150 + Math.random() * 105;
      x.beginPath();
      x.moveTo(sx, -4);
      x.quadraticCurveTo(sx + wob, len * 0.5, sx + wob * 0.4, len);
      x.lineWidth = 0.8 + Math.random() * 2.2;
      x.strokeStyle = `rgba(${l},${l - 6},${l - 14},${0.6 + Math.random() * 0.4})`;
      x.lineCap = 'round';
      x.stroke();
    }
    let rg = x.createLinearGradient(0, 0, 0, H * 0.18);
    rg.addColorStop(0, 'rgba(20,16,12,0.5)'); rg.addColorStop(1, 'rgba(20,16,12,0)');
    x.globalCompositeOperation = 'source-atop'; x.fillStyle = rg; x.fillRect(0, 0, W, H * 0.18);
    x.globalCompositeOperation = 'destination-in';
    const hg = x.createLinearGradient(0, 0, W, 0);
    hg.addColorStop(0, 'rgba(0,0,0,0)'); hg.addColorStop(0.18, 'rgba(0,0,0,1)');
    hg.addColorStop(0.82, 'rgba(0,0,0,1)'); hg.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = hg; x.fillRect(0, 0, W, H);
    const vg = x.createLinearGradient(0, H * 0.7, 0, H);
    vg.addColorStop(0, 'rgba(0,0,0,1)'); vg.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = vg; x.fillRect(0, H * 0.7, W, H * 0.3);
    x.globalCompositeOperation = 'source-over';
    const tex = new T.CanvasTexture(cv); tex.colorSpace = T.SRGBColorSpace; tex.anisotropy = 8;
    return tex;
  }

  // ---------------- scalp sampling ----------------
  hairlineY(d) {
    const az = Math.atan2(d.x, d.z);
    const frontness = (Math.cos(az) + 1) / 2;
    const temple = Math.exp(-Math.pow((Math.abs(az) - 1.25) / 0.5, 2));
    return -0.42 + frontness * 0.47 - temple * 0.12;
  }
  isScalp(d) { return d.y >= this.hairlineY(d); }

  makeFlowTexture() {
    const T = this.T, W = 256, H = 256;
    const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
    const x = cv.getContext('2d');
    x.fillStyle = 'rgb(120,114,106)'; x.fillRect(0, 0, W, H);
    for (let i = 0; i < 130; i++) {
      const sx = Math.random() * W, wob = (Math.random() - 0.5) * 8;
      const dark = Math.random() < 0.4;
      const l = dark ? 50 + Math.random() * 40 : 150 + Math.random() * 105;
      for (const dx of [-W, 0, W]) {
        x.beginPath(); x.moveTo(sx + dx, -2);
        x.quadraticCurveTo(sx + dx + wob, H * 0.5, sx + dx + wob * 0.5, H + 2);
        x.lineWidth = 0.8 + Math.random() * 2.2;
        x.strokeStyle = `rgba(${l},${l - 7},${l - 16},${0.55 + Math.random() * 0.4})`;
        x.lineCap = 'round'; x.stroke();
      }
    }
    const tex = new T.CanvasTexture(cv); tex.colorSpace = T.SRGBColorSpace;
    tex.wrapS = T.RepeatWrapping; tex.wrapT = T.ClampToEdgeWrapping; tex.repeat.set(11, 1); tex.anisotropy = 4;
    return tex;
  }
  scalpSamples(density) {
    const T = this.T, E = this.EGG, out = [];
    const tSteps = Math.round(42 * density), pSteps = Math.round(26 * density);
    for (let pi = 0; pi < pSteps; pi++) {
      const phi = 0.04 + (pi / pSteps) * 2.05;
      for (let ti = 0; ti < tSteps; ti++) {
        const th = (ti / tSteps) * Math.PI * 2;
        const d = new T.Vector3(Math.sin(phi) * Math.sin(th), Math.cos(phi), Math.sin(phi) * Math.cos(th));
        if (!this.isScalp(d)) continue;
        const p = new T.Vector3(d.x * E.x, d.y * E.y, d.z * E.z);
        const n = new T.Vector3(d.x / E.x, d.y / E.y, d.z / E.z).normalize();
        out.push({ p, n, d });
      }
    }
    return out;
  }

  // ---------------- card geometry ----------------
  addCard(acc, root, n, dir, length, width, segs, droop, curl) {
    const T = this.T, up = new T.Vector3(0, -1, 0);
    let p = root.clone().add(n.clone().multiplyScalar(0.015));
    let d = dir.clone().normalize();
    let facing = n.clone();
    const seg = length / segs, rows = [];
    const side0 = new T.Vector3().crossVectors(d, facing).normalize();
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const s = new T.Vector3().crossVectors(d, facing).normalize();
      if (s.lengthSq() < 1e-6) s.copy(side0);
      rows.push({ c: p.clone(), s, w: width * (1 - 0.55 * t), f: facing.clone(), t });
      p = p.clone().add(d.clone().multiplyScalar(seg));
      if (curl) p.add(side0.clone().multiplyScalar(Math.sin(t * Math.PI * 3) * 0.03 * length));
      d = d.clone().lerp(up, droop * 0.14).normalize();
      facing = new T.Vector3().crossVectors(s, d).normalize();
    }
    const base = acc.pos.length / 3;
    rows.forEach((r) => {
      const a = r.c.clone().addScaledVector(r.s, -r.w / 2);
      const b = r.c.clone().addScaledVector(r.s, r.w / 2);
      acc.pos.push(a.x, a.y, a.z, b.x, b.y, b.z);
      acc.nor.push(r.f.x, r.f.y, r.f.z, r.f.x, r.f.y, r.f.z);
      acc.uv.push(0, r.t, 1, r.t);
    });
    for (let i = 0; i < segs; i++) { const k = base + i * 2; acc.idx.push(k, k + 1, k + 2, k + 1, k + 3, k + 2); }
    acc.count++;
  }

  tangentDown(n) {
    const T = this.T, down = new T.Vector3(0, -1, 0);
    return down.clone().sub(n.clone().multiplyScalar(down.dot(n))).normalize();
  }

  buildStyle(acc, samples, styleIdx, L) {
    const T = this.T;
    samples.forEach(({ p, n, d }) => {
      const td = this.tangentDown(n);
      if (styleIdx === 0) {
        const dir = td.clone().multiplyScalar(0.85).add(n.clone().multiplyScalar(0.22)).normalize();
        this.addCard(acc, p, n, dir, 0.34 * L, 0.2, 5, 0.7, 0);
      } else if (styleIdx === 1) {
        const topness = Math.max(0, d.y);
        const sweep = new T.Vector3(0.7, -0.1, -0.2);
        const dir = td.clone().multiplyScalar(0.55).add(n.clone().multiplyScalar(0.18)).add(sweep.multiplyScalar(0.5 + 0.6 * topness)).normalize();
        const len = (0.32 + 0.34 * topness) * L;
        this.addCard(acc, p, n, dir, len, 0.19, 6, 0.55, 0.1);
      } else if (styleIdx === 2) {
        const down = new T.Vector3(0, -1, 0);
        const front = d.z > 0.0;
        const dir = td.clone().lerp(down, 0.65).normalize();
        if (front) dir.add(new T.Vector3(d.x * 0.3, 0, 0.1)).normalize();
        const len = (front ? 0.95 : 1.45) * L;
        this.addCard(acc, p, n, dir, len, 0.14, 8, 1.0, 0.08);
      }
    });
    if (styleIdx === 3) {
      const gather = new T.Vector3(0, 0.25, -1.05);
      samples.forEach(({ p, n }) => {
        const dir = gather.clone().sub(p);
        const len = dir.length() * 0.92;
        this.addCard(acc, p, n, dir.normalize(), len, 0.1, 5, 0.25, 0);
      });
      const tailN = new T.Vector3(0, 0.3, -1).normalize();
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2, r = 0.04 + (i % 3) * 0.02;
        const root = gather.clone().add(new T.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
        const dir = new T.Vector3(Math.cos(a) * 0.12, -1, -0.25 + Math.sin(a) * 0.1).normalize();
        this.addCard(acc, root, tailN, dir, 1.1 * L, 0.12, 7, 0.45, 0.1);
      }
    }
  }

  buildCap(styleIdx) {
    const T = this.T, E = this.EGG, off = 1.05;
    const pas = 64, tas = 96, pos = [], nor = [], uv = [], idx = []; let vi = 0;
    const dirAt = (phi, th) => new T.Vector3(Math.sin(phi) * Math.sin(th), Math.cos(phi), Math.sin(phi) * Math.cos(th));
    const maxPhi = 2.1, TAU = Math.PI * 2;
    for (let pi = 0; pi < pas; pi++) {
      const a0 = 0.01 + (pi / pas) * maxPhi, a1 = 0.01 + ((pi + 1) / pas) * maxPhi;
      for (let ti = 0; ti < tas; ti++) {
        const t0 = (ti / tas) * TAU, t1 = ((ti + 1) / tas) * TAU;
        const corners = [[a0, t0], [a0, t1], [a1, t1], [a1, t0]].map(([ph, th]) => ({ d: dirAt(ph, th), ph, th }));
        if (!corners.every(c => this.isScalp(c.d))) continue;
        const b = vi;
        corners.forEach(({ d, ph, th }) => {
          pos.push(d.x * E.x * off, d.y * E.y * off, d.z * E.z * off);
          const n = new T.Vector3(d.x / E.x, d.y / E.y, d.z / E.z).normalize();
          nor.push(n.x, n.y, n.z);
          uv.push(th / TAU, ph / maxPhi);
        });
        idx.push(b, b + 1, b + 2, b, b + 2, b + 3); vi += 4;
      }
    }
    const g = new T.BufferGeometry();
    g.setAttribute('position', new T.Float32BufferAttribute(pos, 3));
    g.setAttribute('normal', new T.Float32BufferAttribute(nor, 3));
    g.setAttribute('uv', new T.Float32BufferAttribute(uv, 2));
    g.setIndex(idx);
    const m = new T.Mesh(g, this.capMat); m.castShadow = true; m.receiveShadow = true;
    return m;
  }

  rebuildHair() {
    const T = this.T, s = this.state;
    if (this.hair) { this.scene.remove(this.hair); this.hair.geometry.dispose(); this.hair = null; }
    if (this.cap) { this.scene.remove(this.cap); this.cap.geometry.dispose(); this.cap = null; }
    this.cap = this.buildCap(s.style); this.scene.add(this.cap);
    const samples = this.scalpSamples(s.density);
    const acc = { pos: [], nor: [], uv: [], idx: [], count: 0 };
    this.buildStyle(acc, samples, s.style, s.length);
    if (s.fly) this.addFlyaways(acc, samples, s.length);
    const g = new T.BufferGeometry();
    g.setAttribute('position', new T.Float32BufferAttribute(acc.pos, 3));
    g.setAttribute('normal', new T.Float32BufferAttribute(acc.nor, 3));
    g.setAttribute('uv', new T.Float32BufferAttribute(acc.uv, 2));
    g.setIndex(acc.idx);
    const mesh = new T.Mesh(g, this.hairMat); mesh.castShadow = true;
    this.scene.add(mesh); this.hair = mesh;
    this.setState({ cards: acc.count });
  }

  addFlyaways(acc, samples, L) {
    const T = this.T;
    const pick = samples.filter((_, i) => i % 9 === 0);
    pick.forEach(({ p, n }) => {
      const td = this.tangentDown(n);
      const jit = new T.Vector3((Math.random() - 0.5) * 0.5, 0.2 + Math.random() * 0.3, (Math.random() - 0.5) * 0.5);
      const dir = td.clone().add(jit).normalize();
      this.addCard(acc, p, n, dir, (0.3 + Math.random() * 0.4) * L, 0.03, 4, 0.8, 0.4);
    });
  }

  // ---------------- actions ----------------
  toggleRotate = () => this.setState(s => ({ rotate: !s.rotate }));
  toggleFly = () => this.setState(s => ({ fly: !s.fly }));
  onDensity = (e) => this.setState({ density: +e.target.value });
  onLength = (e) => this.setState({ length: +e.target.value });

  exportGLB = async () => {
    if (this.state.exporting || !this.hair) return;
    this.setState({ exporting: true });
    try {
      const { GLTFExporter } = await import('three/addons/exporters/GLTFExporter.js');
      const grp = new this.T.Group(); grp.add(this.hair.clone());
      new GLTFExporter().parse(grp, (buf) => {
        const blob = new Blob([buf], { type: 'model/gltf-binary' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'hair_' + this.STYLES[this.state.style].name.toLowerCase().replace(/ /g, '') + '.glb';
        a.click(); URL.revokeObjectURL(a.href); this.setState({ exporting: false });
      }, (err) => { console.error(err); this.setState({ exporting: false }); }, { binary: true });
    } catch (e) { console.error(e); this.setState({ exporting: false }); }
  };

  // ---------------- render ----------------
  renderVals() {
    const st = this.state, ink = 'var(--text)', acc = 'var(--accent)';
    const styleButtons = this.STYLES.map((x, i) => {
      const on = i === st.style;
      return {
        name: x.name, tag: x.tag,
        bg: on ? 'var(--accent-dim)' : 'var(--panel-2)',
        border: on ? acc : 'var(--edge)',
        color: ink,
        tagColor: on ? acc : 'var(--muted)',
        onClick: () => this.setState({ style: i }),
      };
    });
    const colorSwatches = this.COLORS.map((x, i) => {
      const on = i === st.color;
      return {
        color: x.c, label: x.n,
        shadow: on ? '0 0 0 2px var(--panel), 0 0 0 3.5px ' + acc : 'inset 0 0 0 1px var(--edge)',
        onClick: () => this.setState({ color: i }),
      };
    });
    return {
      viewportRef: this.viewportRef, loading: st.loading, cardCount: String(st.cards).padStart(4, '0'),
      styleButtons, colorSwatches, colorName: this.COLORS[st.color].n.toUpperCase(),
      density: st.density, length: st.length,
      densityPct: Math.round(st.density * 100) + '%', lengthPct: Math.round(st.length * 100) + '%',
      onDensity: this.onDensity, onLength: this.onLength,
      toggleFly: this.toggleFly,
      flyTrack: st.fly ? acc : 'var(--edge)', flyKnob: st.fly ? '20px' : '2px',
      exportGLB: this.exportGLB, exportLabel: st.exporting ? 'EXPORTING…' : 'EXPORT · GLB',
      embedded: st.embedded, sendToStudio: this.sendToStudio, sendLabel: st.sending ? 'SENDING…' : 'USE IN STUDIO',
      toggleRotate: this.toggleRotate, rotateLabel: st.rotate ? 'SPIN' : 'STATIC',
      rotateColor: st.rotate ? acc : ink,
      rotateBg: 'var(--panel-2)',
      rotateBorder: st.rotate ? acc : 'var(--edge)',
    };
  }
}
</script>
</body>
</html>
